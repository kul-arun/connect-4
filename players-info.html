<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect4 Game</title>
    <link href="styles/players-info.css" rel="stylesheet"/>
</head>
<body>
    <header>
        <h1>CONNECT<span>4</span></h1>
    </header>
    <main>
        <form>
            <div class="player1">
                <label for="p1">Player 1: &nbsp;</label>
                <input type="text" id="p1" class="player-names" placeholder="Name"> 
            </div>
            <div class="player2">
                <label for="p2">Player 2: &nbsp;</label>
                <input type="text" id="p2" class="player-names" placeholder="Name">
            </div>
            <button type="submit">Submit</button>
        </form>
</body>
</html>
